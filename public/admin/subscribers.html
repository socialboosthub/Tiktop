<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subscribers - TikTop Admin</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:14px;
border:1px solid #333;
text-align:left;
}

th{
background:#EE1D52;
}

tr:nth-child(even){
background:#1a1a1a;
}

button{
background:#25F4EE;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-bottom:20px;
}
</style>

</head>
<body>

<h1>Supporters</h1>

<button onclick="load()">Refresh</button>

<table>

<thead>

<tr>
<th>Email</th>
<th>Amount</th>
<th>Mode</th>
<th>Date</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

<script>

async function load(){

const res=await fetch("/api/admin/supporters",{
headers:{
Authorization:"Bearer "+localStorage.adminToken
}
});

const data=await res.json();

const body=document.getElementById("tbody");

body.innerHTML="";

data.forEach(d=>{

body.innerHTML+=`
<tr>

<td>${d.email}</td>

<td>$${d.amount}</td>

<td>${d.mode}</td>

<td>${new Date(d.createdAt).toLocaleString()}</td>

</tr>
`;

});

}

load();

</script>

</body>
</html>
