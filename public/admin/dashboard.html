<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TikTop Admin Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111;
border-bottom:1px solid #222;
}

header h1{
font-size:28px;
}

.logout{
background:#EE1D52;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.container{
padding:35px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:#161616;
padding:25px;
border-radius:14px;
}

.card h3{
color:#999;
margin-bottom:15px;
font-size:15px;
}

.card h2{
font-size:34px;
color:#25F4EE;
}

table{
width:100%;
border-collapse:collapse;
background:#161616;
border-radius:12px;
overflow:hidden;
}

th{
background:#222;
padding:15px;
}

td{
padding:15px;
border-top:1px solid #222;
}

.search{
width:100%;
padding:14px;
margin-bottom:20px;
background:#222;
border:none;
color:white;
border-radius:10px;
font-size:15px;
}
</style>

</head>

<body>

<header>

<h1>📊 TikTop Admin</h1>

<button class="logout" onclick="logout()">
Logout
</button>

</header>

<div class="container">

<input
class="search"
id="search"
placeholder="Search supporter email...">

<div class="cards">

<div class="card">
<h3>Total Donations</h3>
<h2 id="donations">0</h2>
</div>

<div class="card">
<h3>Total Raised</h3>
<h2 id="raised">$0</h2>
</div>

<div class="card">
<h3>Monthly Members</h3>
<h2 id="members">0</h2>
</div>

<div class="card">
<h3>Supporters</h3>
<h2 id="supporters">0</h2>
</div>

</div>

<table>

<thead>

<tr>

<th>Email</th>

<th>Amount</th>

<th>Type</th>

<th>Status</th>

<th>Date</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>


<script>

async function checkLogin(){

const res=await fetch("/api/auth");

if(!res.ok){

location="/admin/";

}

}

checkLogin();

async function loadDashboard(){

const res=await fetch("/api/stats");

const data=await res.json();

document.getElementById("donations").innerText=data.totalDonations;

document.getElementById("raised").innerText="$"+data.totalRaised;

document.getElementById("members").innerText=data.monthlyMembers;

document.getElementById("supporters").innerText=data.supporters;

let rows="";

data.recent.forEach(d=>{

rows+=`

<tr>

<td>${d.email}</td>

<td>$${d.amount}</td>

<td>${d.mode}</td>

<td>${d.paypalStatus}</td>

<td>${new Date(d.createdAt).toLocaleDateString()}</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=rows;

}

loadDashboard();

async function logout(){

await fetch("/api/logout");

location="/admin/";

}

</script>

</body>

</html>
